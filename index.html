<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Treasure Coaching</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
      text-align: center;
    }

    h1 {
      color: red;
      font-size: 3rem;
      margin-top: 30px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
    }

    button {
      width: 100%;
      padding: 15px;
      background: red;
      border: none;
      color: white;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: darkred;
    }

    .card {
      border: 1px solid red;
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h1>Treasure Coaching</h1>
  <p>Trying My Best To Make You Better</p>

  <div class="container">

    <div class="card">
      <h2>Book PvP Session (₹29)</h2>

      <input id="mc" placeholder="Minecraft Username" />
      <input id="dc" placeholder="Discord Username" />

      <select id="mode">
        <option>NethPot</option>
        <option>CPVP</option>
        <option>Tank/Beast</option>
      </select>

      <input id="date" type="date" />
      <input id="time" type="time" />

      <button onclick="bookSession()">Book Session</button>
    </div>

  </div>

  <script>
    // 🔥 Firebase Config (YOUR PROJECT)
    const firebaseConfig = {
      apiKey: "AIzaSyCnrO2F5hhiIBk-w921KeBsXC2cQV64SEk",
      authDomain: "treasure-coaching.firebaseapp.com",
      projectId: "treasure-coaching",
      storageBucket: "treasure-coaching.appspot.com",
      messagingSenderId: "391426890031",
      appId: "1:391426890031:web:d8d1540fb56a836f7269da"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function bookSession() {
      const mc = document.getElementById("mc").value;
      const dc = document.getElementById("dc").value;
      const mode = document.getElementById("mode").value;
      const date = document.getElementById("date").value;
      const time = document.getElementById("time").value;

      if (!mc || !dc || !date || !time) {
        alert("Please fill all fields!");
        return;
      }

      db.collection("bookings").add({
        minecraft: mc,
        discord: dc,
        mode: mode,
        date: date,
        time: time,
        createdAt: new Date()
      });

      alert("Booking Successful!");
    }
  </script>

</body>
</html>
